# Nginx configuration for UnlimitedHealth
# Optimized for Same-Domain API Proxy (Bypasses CORS entirely)

map $http_origin $cors_origin {
    ~^https://(www\.)?unlimitedhealthcares\.com$ "$http_origin";
    ~^https://app\.unlimitedhealthcares\.com$ "$http_origin";
    default "";
}

upstream unlimitedhealth_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name unlimitedhealthcares.com www.unlimitedhealthcares.com app.unlimitedhealthcares.com api.unlimitedhealthcares.com;
    return 301 https://$host$request_uri;
}

# API Subdomain (Kept for compatibility)
server {
    listen 443 ssl http2;
    server_name api.unlimitedhealthcares.com;

    ssl_certificate /etc/letsencrypt/live/api.unlimitedhealthcares.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.unlimitedhealthcares.com/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location /api/ {
        proxy_pass https://healthcare-backend-8tfs.onrender.com;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host healthcare-backend-8tfs.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}

# MAIN SITE + SAME-DOMAIN API PROXY
server {
    listen 443 ssl http2;
    server_name unlimitedhealthcares.com www.unlimitedhealthcares.com app.unlimitedhealthcares.com;

    ssl_certificate /etc/letsencrypt/live/unlimitedhealthcares.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unlimitedhealthcares.com/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    
    root /var/www/healthcare-frontend;
    index index.html;

    # THE MAGIC: Same-Domain API Proxy
    # Requests to unlimitedhealthcares.com/api/ go here.
    # NO CORS PREFLIGHT REQUIRED!
    location /api/ {
        proxy_pass https://healthcare-backend-8tfs.onrender.com;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host healthcare-backend-8tfs.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE Support (AI Chat Streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WebSocket Proxy for same-origin connections
    location /socket.io/ {
        proxy_pass https://healthcare-backend-8tfs.onrender.com/socket.io/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host healthcare-backend-8tfs.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
}
