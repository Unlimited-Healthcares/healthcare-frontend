# Nginx configuration for UnlimitedHealth API
# This file should be placed in /etc/nginx/sites-available/unlimitedhealthcares.com

# CORS origin mapping - allows dynamic origin handling
map $http_origin $cors_origin {
    ~^https://(www\.)?unlimitedhealthcares\.com$ "$http_origin";
    ~^https://app\.unlimitedhealthcares\.com$ "$http_origin";
    ~^http://217\.21\.78\.192:300[0-9]$ "$http_origin";
    ~^http://localhost:300[0-9]$ "$http_origin";
    ~^http://127\.0\.0\.1:300[0-9]$ "$http_origin";
    default "";
}

# Upstream for the Docker API container
upstream unlimitedhealth_api {
    server 127.0.0.1:3000;  # Your Docker container is already exposing port 3000
    keepalive 32;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

# Main server block for API
server {
    listen 80;
    server_name api.unlimitedhealthcares.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server block for API
server {
    listen 443 ssl http2;
    server_name api.unlimitedhealthcares.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/api.unlimitedhealthcares.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.unlimitedhealthcares.com/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # Rate limiting
    limit_req zone=api burst=20 nodelay;
    
    # Main API location block
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass https://healthcare-backend-8tfs.onrender.com;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host healthcare-backend-8tfs.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass https://healthcare-backend-8tfs.onrender.com/api/health;
        proxy_ssl_server_name on;
        proxy_set_header Host healthcare-backend-8tfs.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # API documentation
    location /docs {
        proxy_pass https://healthcare-backend-8tfs.onrender.com/api/docs;
        proxy_ssl_server_name on;
        proxy_set_header Host healthcare-backend-8tfs.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # API JSON documentation
    location /api-json {
        proxy_pass https://healthcare-backend-8tfs.onrender.com/api/api-json;
        proxy_ssl_server_name on;
        proxy_set_header Host healthcare-backend-8tfs.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Static files (if any)
    location /static/ {
        alias /var/www/healthcare-frontend/dist/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}

# Web app server block (optional - for your web frontend)
server {
    if ($host = app.unlimitedhealthcares.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = www.unlimitedhealthcares.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = unlimitedhealthcares.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name app.unlimitedhealthcares.com www.unlimitedhealthcares.com unlimitedhealthcares.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;






}

server {
    listen 443 ssl http2;
    server_name app.unlimitedhealthcares.com www.unlimitedhealthcares.com unlimitedhealthcares.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/unlimitedhealthcares.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/unlimitedhealthcares.com/privkey.pem; # managed by Certbot
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
